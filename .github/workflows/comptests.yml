name: Compliance Tests

env:
  COMPTEST_SLICING_CONFIG: '{"tiny":1,"small":4,"standard":4}'

on:
  workflow_dispatch:
    inputs:
      repo:
        description: Repository
        type: string
      ref:
        description: Commit, branch, or tag
        type: string
      altair:
        description: Generate altair fork
        default: false
        type: boolean
      bellatrix:
        description: Generate bellatrix fork
        default: false
        type: boolean
      capella:
        description: Generate capella fork
        default: false
        type: boolean
      deneb:
        description: Generate deneb fork
        default: false
        type: boolean
      electra:
        description: Generate electra fork
        default: true
        type: boolean
      fulu:
        description: Generate fulu fork
        default: false
        type: boolean
      gloas:
        description: Generate gloas fork
        default: false
        type: boolean
      tiny:
        description: Generate tiny config
        default: true
        type: boolean
      small:
        description: Generate small config
        default: false
        type: boolean
      standard:
        description: Generate standard config
        default: false
        type: boolean
      seed:
        description: Seed (random if empty)
        default: ""
        type: string
  schedule:
    - cron: "0 0 * * *"

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      repo: ${{ steps.config.outputs.repo }}
      ref: ${{ steps.config.outputs.ref }}
      presets: ${{ steps.config.outputs.presets }}
      forks: ${{ steps.config.outputs.forks }}
      configs: ${{ steps.config.outputs.configs }}
      generate_matrix: ${{ steps.config.outputs.generate_matrix }}
      seed: ${{ steps.config.outputs.seed }}
    steps:
      - name: Resolve configuration
        id: config
        run: |
          # Repo
          repo="${{ inputs.repo || github.repository }}"
          echo "repo=$repo" >> "$GITHUB_OUTPUT"

          # Ref
          ref="${{ inputs.ref }}"
          if [[ -n "$ref" ]]; then
            echo "ref=$ref" >> "$GITHUB_OUTPUT"
          fi

          # Presets
          presets='["minimal"]'
          echo "presets=$presets" >> "$GITHUB_OUTPUT"

          # Forks
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            forks='["altair","bellatrix","capella","deneb","electra","fulu","gloas"]'
          else
            selected=()
            [[ "${{ inputs.altair }}" == "true" ]] && selected+=("altair")
            [[ "${{ inputs.bellatrix }}" == "true" ]] && selected+=("bellatrix")
            [[ "${{ inputs.capella }}" == "true" ]] && selected+=("capella")
            [[ "${{ inputs.deneb }}" == "true" ]] && selected+=("deneb")
            [[ "${{ inputs.electra }}" == "true" ]] && selected+=("electra")
            [[ "${{ inputs.fulu }}" == "true" ]] && selected+=("fulu")
            [[ "${{ inputs.gloas }}" == "true" ]] && selected+=("gloas")

            if [[ ${#selected[@]} -eq 0 ]]; then
              echo "No forks selected." >&2
              exit 1
            fi

            json=$(printf '"%s",' "${selected[@]}")
            forks="[${json%,}]"
          fi
          echo "forks=$forks" >> "$GITHUB_OUTPUT"

          # Generator configs
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            configs='["tiny"]'
          else
            selected=()
            [[ "${{ inputs.tiny }}" == "true" ]] && selected+=("tiny")
            [[ "${{ inputs.small }}" == "true" ]] && selected+=("small")
            [[ "${{ inputs.standard }}" == "true" ]] && selected+=("standard")

            if [[ ${#selected[@]} -eq 0 ]]; then
              echo "No generator configs selected." >&2
              exit 1
            fi

            json=$(printf '"%s",' "${selected[@]}")
            configs="[${json%,}]"
          fi
          echo "configs=$configs" >> "$GITHUB_OUTPUT"

          # Seed
          seed_input="${{ inputs.seed }}"
          if [[ -z "$seed_input" ]]; then
            seed=$(shuf -i 1-2147483647 -n 1)
          elif [[ "$seed_input" =~ ^[0-9]+$ ]]; then
            seed="$seed_input"
          else
            echo "Invalid seed value: '$seed_input'. Must be empty or a number." >&2
            exit 1
          fi
          echo "seed=$seed" >> "$GITHUB_OUTPUT"

          # Generation matrix
          generate_matrix=$(
            jq -cn \
              --argjson presets "$presets" \
              --argjson forks "$forks" \
              --argjson configs "$configs" \
              --argjson slices '${{ env.COMPTEST_SLICING_CONFIG }}' \
              '
              [
                $presets[] as $preset
                | $forks[] as $fork
                | $configs[] as $config
                | (($slices[$config] // 1) | tonumber) as $slice_count
                | if $slice_count < 1 then
                    error("Invalid slice count for config \($config): \($slice_count)")
                  else
                    range(0; $slice_count) as $slice_index
                    | {
                        preset: $preset,
                        fork: $fork,
                        config: $config,
                        slice_index: $slice_index,
                        slice_count: $slice_count
                      }
                  end
              ]
              '
          )
          echo "generate_matrix=$generate_matrix" >> "$GITHUB_OUTPUT"

          # Summary
          echo "Configuration:"
          echo "  repo:    $repo"
          echo "  ref:     ${ref:-<default>}"
          echo "  presets: $presets"
          echo "  forks:   $forks"
          echo "  configs: $configs"
          echo "  seed:    $seed"
          echo "  slicing_config: ${{ env.COMPTEST_SLICING_CONFIG }}"
          echo "  generate_matrix: $generate_matrix"

  generate:
    needs: config
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.config.outputs.generate_matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ needs.config.outputs.repo }}
          ref: ${{ needs.config.outputs.ref }}

      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Generate compliance tests
        run: |
          extra_args=()
          if [[ "${{ matrix.slice_count }}" -gt 1 ]]; then
            extra_args+=(
              "group_slice_index=${{ matrix.slice_index }}"
              "group_slice_count=${{ matrix.slice_count }}"
            )
          fi

          make comptests \
            fc_gen_config=${{ matrix.config }} \
            preset=${{ matrix.preset }} \
            fork=${{ matrix.fork }} \
            comptests_dir=./compliance-spec-tests/${{ matrix.config }} \
            seed=${{ needs.config.outputs.seed }} \
            "${extra_args[@]}"

      - name: Upload compliance tests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: comptests-${{ matrix.config }}-${{ matrix.preset }}-${{ matrix.fork }}-slice${{ matrix.slice_index }}of${{ matrix.slice_count }}
          path: compliance-spec-tests/${{ matrix.config }}
          if-no-files-found: ignore

  package:
    needs: [config, generate]
    runs-on: ubuntu-latest
    permissions:
      actions: write
    strategy:
      matrix:
        config: ${{ fromJson(needs.config.outputs.configs) }}
    steps:
      - name: Download intermediate artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: comptests-${{ matrix.config }}-*
          path: tests
          merge-multiple: true

      - name: Archive compliance tests
        run: |
          tar --sort=name \
              --owner=0 \
              --group=0 \
              --numeric-owner \
              --mtime='@0' \
              --format=gnu \
              --use-compress-program='gzip --no-name' \
              --create \
              --file=${{ matrix.config }}.tar.gz \
              tests

      - name: Upload ${{ matrix.config }}.tar.gz
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ${{ matrix.config }}.tar.gz
          archive: false

      - name: Delete intermediate artifacts
        continue-on-error: true
        run: |
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts \
            --paginate --jq '.artifacts[]
              | select(.name | startswith("comptests-${{ matrix.config }}-"))
              | .id' | while read id; do
            gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$id
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
