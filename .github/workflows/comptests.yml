name: Compliance Tests

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Commit, branch, or tag
        default: master
        type: string
      minimal:
        description: Generate minimal preset
        default: true
        type: boolean
      altair:
        description: Generate altair fork
        default: false
        type: boolean
      bellatrix:
        description: Generate bellatrix fork
        default: false
        type: boolean
      capella:
        description: Generate capella fork
        default: false
        type: boolean
      deneb:
        description: Generate deneb fork
        default: false
        type: boolean
      electra:
        description: Generate electra fork
        default: true
        type: boolean
      fulu:
        description: Generate fulu fork
        default: false
        type: boolean
      gloas:
        description: Generate gloas fork
        default: false
        type: boolean
      tiny:
        description: Generate tiny config
        default: true
        type: boolean
      small:
        description: Generate small config
        default: false
        type: boolean
      standard:
        description: Generate standard config
        default: false
        type: boolean
      seed:
        description: Seed for compliance test generation (empty, number or random)
        default: ""
        type: string
  # schedule:
  #   - cron: "0 0 * * *"

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      presets: ${{ steps.config.outputs.presets }}
      forks: ${{ steps.config.outputs.forks }}
      configs: ${{ steps.config.outputs.configs }}
      maybe_seed: ${{ steps.config.outputs.maybe_seed }}
      seed: ${{ steps.config.outputs.seed }}
      ref: ${{ steps.config.outputs.ref }}
    steps:
      - name: Resolve configuration
        id: config
        run: |
          # Ref
          ref="${{ inputs.ref }}"
          if [[ -n "$ref" ]]; then
            echo "ref=$ref" >> "$GITHUB_OUTPUT"
          fi

          # Presets
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            presets='["minimal"]'
          else
            selected=()
            [[ "${{ inputs.minimal }}" == "true" ]] && selected+=("minimal")

            if [[ ${#selected[@]} -eq 0 ]]; then
              echo "No presets selected." >&2
              exit 1
            fi

            json=$(printf '"%s",' "${selected[@]}")
            presets="[${json%,}]"
          fi
          echo "presets=$presets" >> "$GITHUB_OUTPUT"

          # Forks
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            forks='["electra"]'
          else
            selected=()
            [[ "${{ inputs.altair }}" == "true" ]] && selected+=("altair")
            [[ "${{ inputs.bellatrix }}" == "true" ]] && selected+=("bellatrix")
            [[ "${{ inputs.capella }}" == "true" ]] && selected+=("capella")
            [[ "${{ inputs.deneb }}" == "true" ]] && selected+=("deneb")
            [[ "${{ inputs.electra }}" == "true" ]] && selected+=("electra")
            [[ "${{ inputs.fulu }}" == "true" ]] && selected+=("fulu")
            [[ "${{ inputs.gloas }}" == "true" ]] && selected+=("gloas")

            if [[ ${#selected[@]} -eq 0 ]]; then
              echo "No forks selected." >&2
              exit 1
            fi

            json=$(printf '"%s",' "${selected[@]}")
            forks="[${json%,}]"
          fi
          echo "forks=$forks" >> "$GITHUB_OUTPUT"

          # Generator configs
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            configs='["tiny"]'
          else
            selected=()
            [[ "${{ inputs.tiny }}" == "true" ]] && selected+=("tiny")
            [[ "${{ inputs.small }}" == "true" ]] && selected+=("small")
            [[ "${{ inputs.standard }}" == "true" ]] && selected+=("standard")

            if [[ ${#selected[@]} -eq 0 ]]; then
              echo "No generator configs selected." >&2
              exit 1
            fi

            json=$(printf '"%s",' "${selected[@]}")
            configs="[${json%,}]"
          fi
          echo "configs=$configs" >> "$GITHUB_OUTPUT"

          # Seed
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            seed=""
            maybe_seed=""
          else
            seed_input="${{ inputs.seed }}"
            if [[ -z "$seed_input" ]]; then
              seed=""
              maybe_seed=""
            elif [[ "$seed_input" == "random" ]]; then
              seed=$(shuf -i 1-2147483647 -n 1)
              maybe_seed="seed=$seed"
            elif [[ "$seed_input" =~ ^[0-9]+$ ]]; then
              seed="$seed_input"
              maybe_seed="seed=$seed"
            else
              echo "Invalid seed value: '$seed_input'. Use empty, a number, or 'random'." >&2
              exit 1
            fi
          fi
          echo "seed=$seed" >> "$GITHUB_OUTPUT"
          echo "maybe_seed=$maybe_seed" >> "$GITHUB_OUTPUT"

          # Summary
          echo "Configuration:"
          echo "  ref:     ${ref:-master}"
          echo "  presets: $presets"
          echo "  forks:   $forks"
          echo "  configs: $configs"
          echo "  seed:    ${seed:-<none>}"

  generate:
    needs: config
    timeout-minutes: 330 # 5.5 hours
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: ${{ fromJson(needs.config.outputs.presets) }}
        fork: ${{ fromJson(needs.config.outputs.forks) }}
        config: ${{ fromJson(needs.config.outputs.configs) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.config.outputs.ref }}

      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Clean compliance test output directory
        run: rm -rf compliance-spec-tests/${{ matrix.config }}/${{ matrix.preset }}/${{ matrix.fork }}

      - name: Generate compliance tests
        run: make comptests fc_gen_config=${{ matrix.config }} preset=${{ matrix.preset }} fork=${{ matrix.fork }} comptests_dir=./compliance-spec-tests/${{ matrix.config }} ${{ needs.config.outputs.maybe_seed }}

      - name: Upload compliance tests
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: comptests-${{ matrix.config }}-${{ matrix.preset }}-${{ matrix.fork }}
          path: compliance-spec-tests/${{ matrix.config }}
          if-no-files-found: ignore

  package:
    needs: [config, generate]
    runs-on: ubuntu-latest
    permissions:
      actions: write
    strategy:
      matrix:
        config: ${{ fromJson(needs.config.outputs.configs) }}
    steps:
      - name: Download intermediate artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: comptests-${{ matrix.config }}-*
          path: tests
          merge-multiple: true

      - name: Archive merged compliance tests
        run: tar -czvf ${{ matrix.config }}.tar.gz tests

      - name: Upload ${{ matrix.config }}.tar.gz
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: ${{ matrix.config }}.tar.gz
          archive: false

      - name: Delete intermediate artifacts
        continue-on-error: true
        run: |
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts \
            --paginate --jq '.artifacts[]
              | select(.name | startswith("comptests-${{ matrix.config }}-"))
              | .id' | while read id; do
            gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$id
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
