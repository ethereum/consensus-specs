name: Nightly Pytest Reference Tests

defaults:
  run:
    shell: zsh -e {0}

on:
  workflow_dispatch:
    inputs:
      repo:
        description: The repository to use (e.g. user/consensus-specs)
        default: ethereum/consensus-specs
        type: string
        required: true
      ref:
        description: The branch, tag or SHA to checkout and build from
        default: master
        type: string
        required: true
  schedule:
    - cron: "0 0 * * *"

jobs:
  generate:
    timeout-minutes: 720 # 12 hours
    runs-on: [self-hosted-ghr-custom, size-s-x64, profile-consensusSpecs]
    strategy:
      fail-fast: false
      matrix:
        preset:
          - general
          - minimal
          - mainnet
        fork:
          - phase0
          - altair
          - bellatrix
          - capella
          - deneb
          - electra
          - fulu
          - gloas
          - heze
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repo }}
          path: "consensus-specs"
          ref: ${{ inputs.ref }}
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: "consensus-specs/pyproject.toml"
      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          enable-cache: true
          version: ${{ vars.UV_VERSION }}
      - name: Generate tests
        run: |
          cd consensus-specs
          make test component=pyspec preset=${{ matrix.preset }} fork=${{ matrix.fork }} reftests=true
      - name: Upload reference tests
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: reftests-${{ matrix.preset }}-${{ matrix.fork }}
          path: pytest-reftests/tests/${{ matrix.preset }}
          if-no-files-found: ignore

  package:
    needs: generate
    runs-on: [self-hosted-ghr-custom, size-s-x64, profile-consensusSpecs]
    strategy:
      matrix:
        preset:
          - general
          - minimal
          - mainnet
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: reftests-${{ matrix.preset }}-*
          path: tests/${{ matrix.preset }}
          merge-multiple: true
      - name: Archive reference tests
        run: tar -czvf ${{ matrix.preset }}.tar.gz tests/${{ matrix.preset }}
      - name: Delete intermediate artifacts
        run: |
          artifact_ids=$(gh api actions/runs/${{ github.run_id }}/artifacts \
            --paginate --jq '.artifacts[]
              | select(.name | startswith("reftests-${{ matrix.preset }}-"))
              | .id')
          for id in $artifact_ids; do
            gh api -X DELETE actions/artifacts/$id
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
      - name: Upload ${{ matrix.preset }}.tar.gz
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: ${{ matrix.preset }}.tar.gz
          archive: false
