name: Nightly Tests

defaults:
  run:
    shell: zsh -e {0}

on:
  workflow_dispatch:
    inputs:
      repo:
        description: The repository to use (e.g. user/consensus-specs)
        default: ethereum/consensus-specs
        type: string
        required: true
      ref:
        description: The branch, tag or SHA to checkout and build from
        default: master
        type: string
        required: true
  schedule:
    - cron: "0 0 * * *"

jobs:
  generate:
    timeout-minutes: 720 # 12 hours
    runs-on: [self-hosted-ghr-custom, size-s-x64, profile-consensusSpecs]
    strategy:
      fail-fast: false
      matrix:
        preset:
          - general
          - minimal
          - mainnet
        fork:
          - phase0
          - altair
          - bellatrix
          - capella
          - deneb
          - electra
          - fulu
          - gloas
          - heze
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.ref }}

      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          enable-cache: true
          version: ${{ vars.UV_VERSION }}

      - name: Generate tests
        run: make test component=pyspec preset=${{ matrix.preset }} fork=${{ matrix.fork }} reftests=true

      - name: Upload reference tests
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: reftests-${{ matrix.preset }}-${{ matrix.fork }}
          path: reftests/${{ matrix.preset }}
          if-no-files-found: ignore

  package:
    needs: generate
    runs-on: [self-hosted-ghr-custom, size-s-x64, profile-consensusSpecs]
    permissions:
      actions: write
    strategy:
      matrix:
        preset:
          - general
          - minimal
          - mainnet
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: reftests-${{ matrix.preset }}-*
          path: tests/${{ matrix.preset }}
          merge-multiple: true

      - name: Archive reference tests
        run: tar -czvf ${{ matrix.preset }}.tar.gz tests/${{ matrix.preset }}

      - name: Upload ${{ matrix.preset }}.tar.gz
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.preset }}.tar.gz
          path: ${{ matrix.preset }}.tar.gz
          archive: false

      - name: Delete intermediate artifacts
        continue-on-error: true
        run: |
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts \
            --paginate --jq '.artifacts[]
              | select(.name | startswith("reftests-${{ matrix.preset }}-"))
              | .id' | while read id; do
            gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$id
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  publish:
    if: github.event_name == 'schedule' || (github.event.inputs.ref == 'master' && github.event.inputs.repo == 'ethereum/consensus-specs')
    needs: [package]
    runs-on: [self-hosted-ghr-custom, size-s-x64, profile-consensusSpecs]
    concurrency:
      group: nightly-release-publish
      cancel-in-progress: false
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.ref }}

      - name: Download packaged artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: "*.tar.gz"
          merge-multiple: true

      - name: Generate metadata
        id: meta
        run: |
          run_date=$(gh api "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --jq '.run_started_at | split("T")[0]')
          echo "date=nightly-${run_date}" >> "$GITHUB_OUTPUT"
          sha256sum general.tar.gz minimal.tar.gz mainnet.tar.gz > checksums.txt
          echo "nightly-${run_date}" > version.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nightly release
        run: |
          git tag -f nightly
          git push origin nightly --force
          if ! gh release view nightly >/dev/null 2>&1; then
            gh release create nightly --target ${{ github.sha }} --prerelease --title "Nightly" --notes ""
          fi
          gh release upload nightly --clobber \
            general.tar.gz minimal.tar.gz mainnet.tar.gz checksums.txt version.txt
          gh release edit nightly \
            --prerelease \
            --title "Nightly (${{ steps.meta.outputs.date }})" \
            --notes "Reference test vectors from \`$(git rev-parse --short HEAD)\` on \`master\`."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
