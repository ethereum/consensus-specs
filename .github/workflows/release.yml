name: Release

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    outputs:
      tag: ${{ steps.tag.outputs.name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create tag
        id: tag
        run: |
          version="v$(cat tests/core/pyspec/eth_consensus_specs/VERSION.txt)"
          if git rev-parse "refs/tags/$version" >/dev/null 2>&1; then
            echo "Error: Tag $version already exists"
            exit 1
          fi
          git tag "$version"
          git push origin "$version"
          echo "Created and pushed tag $version"
          echo "name=$version" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        uses: release-drafter/release-drafter@5de93583980a40bd78603b6dfdcda5b4df377b32 # v7.2.0
        with:
          name: ${{ steps.tag.outputs.name }}
          tag: ${{ steps.tag.outputs.name }}
          include-pre-releases: true
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
          publish: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  generate:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        preset:
          - general
          - minimal
          - mainnet
        fork:
          - phase0
          - altair
          - bellatrix
          - capella
          - deneb
          - electra
          - fulu
          - gloas
          - heze
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          version: ${{ vars.UV_VERSION }}

      - name: Generate tests
        run: make test component=pyspec verbose=true preset=${{ matrix.preset }} fork=${{ matrix.fork }} reftests=true

      - name: Upload reference tests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reftests-${{ matrix.preset }}-${{ matrix.fork }}
          path: reftests/${{ matrix.preset }}
          if-no-files-found: ignore

  package:
    needs: [setup, generate]
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    strategy:
      matrix:
        preset:
          - general
          - minimal
          - mainnet
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: reftests-${{ matrix.preset }}-*
          path: tests/${{ matrix.preset }}
          merge-multiple: true

      - name: Archive reference tests
        run: |
          tar --sort=name \
              --owner=0 \
              --group=0 \
              --numeric-owner \
              --mtime='@0' \
              --format=gnu \
              --use-compress-program='gzip --no-name' \
              --create \
              --file=${{ matrix.preset }}.tar.gz \
              tests/${{ matrix.preset }}

      - name: Upload to release
        run: gh release upload "${{ needs.setup.outputs.tag }}" ${{ matrix.preset }}.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Delete intermediate artifacts
        continue-on-error: true
        run: |
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts \
            --paginate --jq '.artifacts[]
              | select(.name | startswith("reftests-${{ matrix.preset }}-"))
              | .id' | while read id; do
            gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$id
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  publish:
    needs: [setup, package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Publish release
        run: gh release edit "${{ needs.setup.outputs.tag }}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv ${{ vars.UV_VERSION }}
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          version: ${{ vars.UV_VERSION }}

      - name: Generate specs
        run: uv run python -m pysetup.generate_specs --all-forks

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
