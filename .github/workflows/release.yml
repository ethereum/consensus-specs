name: Release

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    outputs:
      tag: ${{ steps.tag.outputs.name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Create tag
        id: tag
        run: |
          version="v$(yq -p toml '.project.version' pyproject.toml)"
          if git rev-parse "refs/tags/$version" >/dev/null 2>&1; then
            echo "Error: Tag $version already exists"
            exit 1
          fi
          git tag "$version"
          git push origin "$version"
          echo "Created and pushed tag $version"
          echo "name=$version" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        uses: release-drafter/release-drafter@693d20e7c1ce1a81d3a41962f85914253b518449 # v7.3.1
        with:
          name: ${{ steps.tag.outputs.name }}
          tag: ${{ steps.tag.outputs.name }}
          include-pre-releases: true
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
          publish: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  generate:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        preset:
          - general
          - minimal
          - mainnet
        fork:
          - phase0
          - altair
          - bellatrix
          - capella
          - deneb
          - electra
          - fulu
          - gloas
          - heze
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          version: ${{ vars.UV_VERSION }}

      - name: Generate tests
        run: make test component=pyspec preset=${{ matrix.preset }} fork=${{ matrix.fork }} reftests=true

      - name: Upload reference tests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reftests-${{ matrix.preset }}-${{ matrix.fork }}
          path: reftests/${{ matrix.preset }}
          if-no-files-found: ignore

  package:
    needs: [setup, generate]
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    strategy:
      matrix:
        preset:
          - general
          - minimal
          - mainnet
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Package reference tests
        uses: ./.github/actions/package
        with:
          name: ${{ matrix.preset }}
          artifact-prefix: reftests
          source-path: tests/${{ matrix.preset }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to release
        run: gh release upload "${{ needs.setup.outputs.tag }}" ${{ matrix.preset }}.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  publish:
    needs: [setup, package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Publish release
        run: gh release edit "${{ needs.setup.outputs.tag }}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv ${{ vars.UV_VERSION }}
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          version: ${{ vars.UV_VERSION }}

      - name: Generate specs
        run: uv run python -m pysetup.generate_specs --all-forks

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  trigger-comptests:
    needs: [setup, publish]
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Trigger compliance test generation
        run: |
          gh workflow run comptests.yml \
            --ref "${{ needs.setup.outputs.tag }}" \
            --field repo="${{ github.repository }}" \
            --field ref="${{ needs.setup.outputs.tag }}" \
            --field release_tag="${{ needs.setup.outputs.tag }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
