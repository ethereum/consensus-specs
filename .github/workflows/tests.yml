name: Tests

on:
  workflow_dispatch:
    inputs:
      repo:
        description: The repository to use (e.g. user/consensus-specs)
        default: ethereum/consensus-specs
        type: string
      ref:
        description: The branch, tag or SHA to checkout and build from
        default: master
        type: string
      general:
        description: Generate general preset
        default: true
        type: boolean
      minimal:
        description: Generate minimal preset
        default: true
        type: boolean
      mainnet:
        description: Generate mainnet preset
        default: false
        type: boolean
      runners:
        description: Runner environment
        default: github
        type: choice
        options:
          - github
          - self-hosted
  schedule:
    - cron: "0 0 * * *"

jobs:
  generate:
    timeout-minutes: 1440 # 24 hours
    runs-on: ${{ inputs.runners == 'github' && 'ubuntu-latest' || fromJson('["self-hosted-ghr-custom", "size-s-x64", "profile-consensusSpecs"]') }}
    strategy:
      fail-fast: false
      matrix:
        preset: ${{ github.event_name == 'schedule' && fromJson('["general", "minimal", "mainnet"]') || fromJson(format('[{0}]', format('{0}{1}{2}', inputs.general && '"general"' || '', inputs.minimal && format('{0}"minimal"', inputs.general && ',' || '') || '', inputs.mainnet && format('{0}"mainnet"', (inputs.general || inputs.minimal) && ',' || '') || ''))) }}
        fork:
          - phase0
          - altair
          - bellatrix
          - capella
          - deneb
          - electra
          - fulu
          - gloas
          - heze
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repo || github.repository }}
          ref: ${{ inputs.ref }}

      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Generate tests
        run: make test component=pyspec preset=${{ matrix.preset }} fork=${{ matrix.fork }} reftests=true

      - name: Upload reference tests
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: reftests-${{ matrix.preset }}-${{ matrix.fork }}
          path: reftests/${{ matrix.preset }}
          if-no-files-found: ignore

  package:
    needs: generate
    runs-on: ${{ inputs.runners == 'github' && 'ubuntu-latest' || fromJson('["self-hosted-ghr-custom", "size-s-x64", "profile-consensusSpecs"]') }}
    permissions:
      actions: write
    strategy:
      matrix:
        preset: ${{ github.event_name == 'schedule' && fromJson('["general", "minimal", "mainnet"]') || fromJson(format('[{0}]', format('{0}{1}{2}', inputs.general && '"general"' || '', inputs.minimal && format('{0}"minimal"', inputs.general && ',' || '') || '', inputs.mainnet && format('{0}"mainnet"', (inputs.general || inputs.minimal) && ',' || '') || ''))) }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: reftests-${{ matrix.preset }}-*
          path: tests/${{ matrix.preset }}
          merge-multiple: true

      - name: Archive reference tests
        run: tar -czvf ${{ matrix.preset }}.tar.gz tests/${{ matrix.preset }}

      - name: Upload ${{ matrix.preset }}.tar.gz
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: ${{ matrix.preset }}.tar.gz
          archive: false

      - name: Delete intermediate artifacts
        continue-on-error: true
        run: |
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts \
            --paginate --jq '.artifacts[]
              | select(.name | startswith("reftests-${{ matrix.preset }}-"))
              | .id' | while read id; do
            gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$id
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
