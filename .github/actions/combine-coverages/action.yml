name: Combine coverages
description: >-
  Download intermediate coverage data artifacts, combine the presets' data into
  a single coverage report, and delete the intermediates. The caller is
  responsible for checking out the repository and uploading the report.

inputs:
  artifact-prefix:
    description: Prefix for intermediate artifact names.
    required: true
  output-path:
    description: Directory to write the combined coverage report into.
    default: coverage
  github-token:
    description: Token used to delete intermediate artifacts.
    required: true

runs:
  using: composite
  steps:
    - name: Setup python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version-file: "pyproject.toml"

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        enable-cache: true

    - name: Build pyspec
      shell: bash
      run: make _pyspec

    - name: Download intermediate artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        pattern: ${{ inputs.artifact-prefix }}-*
        path: coverage-data

    - name: Combine coverage data
      shell: bash
      run: |
        uv run python scripts/combine_preset_coverage.py coverage-data/*/coverage-data --output coverage-combined.data
        uv run coverage html --data-file=coverage-combined.data -d ${{ inputs.output-path }}
        uv run coverage json --data-file=coverage-combined.data -o ${{ inputs.output-path }}/coverage.json

    - name: Delete intermediate artifacts
      shell: bash
      run: |
        gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts \
          --paginate --jq '.artifacts[]
            | select(.name | startswith("${{ inputs.artifact-prefix }}-"))
            | .id' | while read id; do
          gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$id
        done
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        GH_REPO: ${{ github.repository }}
