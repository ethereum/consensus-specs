name: Package tests
description: >-
  Download intermediate test artifacts, archive them into a tarball, and delete
  the intermediates. The caller is responsible for uploading the tarball.

inputs:
  name:
    description: Tarball name (without .tar.gz) and key used in artifact filtering.
    required: true
  artifact-prefix:
    description: Prefix for intermediate artifact names.
    required: true
  source-path:
    description: Directory to download artifacts into and to include in the tarball.
    required: true
  require-manifest:
    description: Require downloaded test artifacts to include manifest.yaml files.
    default: "false"
  github-token:
    description: Token used to delete intermediate artifacts.
    required: true

runs:
  using: composite
  steps:
    - name: Download intermediate artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        pattern: ${{ inputs.artifact-prefix }}-${{ inputs.name }}-*
        path: ${{ inputs.source-path }}
        merge-multiple: true

    - name: Validate downloaded test artifacts
      if: ${{ inputs.require-manifest == 'true' }}
      shell: bash
      run: |
        source_path="${{ inputs.source-path }}"

        if [[ ! -d "$source_path" ]]; then
          echo "Missing downloaded artifact directory: $source_path" >&2
          exit 1
        fi

        manifest="$(find "$source_path" -name manifest.yaml -type f -print -quit)"
        if [[ -z "$manifest" ]]; then
          echo "No manifest.yaml files found in downloaded artifacts: $source_path" >&2
          exit 1
        fi

        missing_manifest=false
        while IFS= read -r output_file; do
          case_dir="$(dirname "$output_file")"
          if [[ ! -f "$case_dir/manifest.yaml" ]]; then
            echo "Missing manifest.yaml next to output file: $output_file" >&2
            missing_manifest=true
          fi
        done < <(find "$source_path" -type f)

        if [[ "$missing_manifest" == "true" ]]; then
          exit 1
        fi

    - name: Archive tests
      shell: bash
      run: |
        if [[ "${{ inputs.require-manifest }}" != "true" ]]; then
          # Some callers intentionally allow empty artifact sets.
          mkdir -p ${{ inputs.source-path }}
        fi
        tar --sort=name \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            --mtime='@0' \
            --format=gnu \
            --use-compress-program='gzip --no-name' \
            --create \
            --file=${{ inputs.name }}.tar.gz \
            ${{ inputs.source-path }}

    - name: Delete intermediate artifacts
      shell: bash
      run: |
        gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts \
          --paginate --jq '.artifacts[]
            | select(.name | startswith("${{ inputs.artifact-prefix }}-${{ inputs.name }}-"))
            | .id' | while read id; do
          gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$id
        done
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        GH_REPO: ${{ github.repository }}
